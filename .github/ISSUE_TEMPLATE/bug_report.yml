name: Bug Report
description: Report a bug in Deckflow
title: "[Bug]: "
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: Deckflow version
      placeholder: "0.2.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `deckflow import examples/python-de-interview`
        2. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: input
    id: db-path
    attributes:
      label: Database path (if relevant)
      placeholder: ~/.deckflow/deckflow.db

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste CLI output or API error responses
